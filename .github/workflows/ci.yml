name: CI

on:
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm run ci-cd

  ci:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always()
    steps:
      - name: All checks passed
        run: |
          if [ "${{ needs.build-and-test.result }}" != "success" ]; then
            echo "build-and-test failed or was cancelled"
            exit 1
          fi
