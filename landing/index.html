<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Punch Tamagotchi 🐒 — Coming Soon</title>
  <meta name="description" content="Punch Tamagotchi — your pocket orangutan. Feed him bananas, keep him happy, watch him grow. Coming soon." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐒</text></svg>" />
  <style>
    :root {
      --jungle: #2a8a47;
      --jungle-deep: #0f5226;
      --banana: #ffd23f;
      --banana-deep: #f4a900;
      --cream: #fff8e7;
      --bark: #7a4f2a;
      --bark-light: #9c6b3f;
      --earth: #4a3018;
      --earth-deep: #2a1a0c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(to bottom, var(--jungle) 0%, var(--jungle-deep) 55%, #1c3d1c 100%);
      color: var(--cream);
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* faint big background trees */
    .bg-trees { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .bg-trees span {
      position: absolute;
      bottom: 70px;
      font-size: clamp(8rem, 22vw, 16rem);
      opacity: 0.10;
      filter: blur(1px);
    }

    /* hanging canopy + vines from the top */
    .canopy { position: fixed; top: 0; left: 0; right: 0; z-index: 1; pointer-events: none; }
    .canopy .foliage {
      display: flex;
      justify-content: space-between;
      font-size: clamp(2.6rem, 7vw, 4.5rem);
      line-height: 0.6;
      margin-top: -0.55em;
      filter: drop-shadow(0 6px 7px rgba(0,0,0,0.3));
    }
    .vine {
      position: absolute;
      top: 0;
      width: 5px;
      border-radius: 0 0 4px 4px;
      background: linear-gradient(to bottom, var(--jungle-deep), var(--jungle));
      transform-origin: top center;
      animation: sway 5s ease-in-out infinite;
    }
    .vine::after {
      content: "🍃";
      position: absolute;
      left: 50%;
      bottom: -0.45em;
      transform: translateX(-50%);
      font-size: 1.7rem;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,0.3));
    }
    @keyframes sway {
      0%, 100% { transform: rotate(-2.5deg); }
      50%      { transform: rotate(2.5deg); }
    }

    /* drifting bananas in the background — big, bold, tumbling */
    .bananas { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
    .bananas span {
      position: absolute;
      top: -12%;
      opacity: 0.40;
      filter: drop-shadow(0 5px 8px rgba(0,0,0,0.3));
      animation: fall linear infinite;
    }
    @keyframes fall {
      0%   { transform: translateY(-14vh) translateX(0)     rotate(0deg)   scale(0.9); }
      25%  { transform: translateY(20vh)  translateX(28px)  rotate(200deg) scale(1.1); }
      50%  { transform: translateY(55vh)  translateX(-24px) rotate(420deg) scale(0.95); }
      75%  { transform: translateY(85vh)  translateX(22px)  rotate(620deg) scale(1.15); }
      100% { transform: translateY(120vh) translateX(0)     rotate(800deg) scale(0.9); }
    }

    /* header shade: dark-green canopy fade from the top down (mirrors the brown floor) */
    .header-shade {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 240px;
      background: linear-gradient(to bottom, #08331a 0%, rgba(15, 82, 38, 0.55) 45%, transparent 100%);
      z-index: 0;
      pointer-events: none;
    }

    /* jungle floor: brown earth band + palm-tree skyline */
    .jungle-floor {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      height: 150px;
      background: linear-gradient(to bottom, transparent 0%, var(--earth) 45%, var(--earth-deep) 100%);
      z-index: 1;
      pointer-events: none;
    }
    .skyline {
      position: absolute;
      left: 0; right: 0; bottom: 52px;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      padding: 0 1rem;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,0.35));
    }
    .skyline span { line-height: 1; }
    .skyline .t1 { font-size: 5.5rem; }
    .skyline .t2 { font-size: 4rem; }
    .skyline .t3 { font-size: 6.5rem; }
    @media (max-width: 640px) {
      .skyline span { font-size: 3.2rem !important; }
    }

    .card {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 2.5rem 1.5rem 9rem;
      max-width: 680px;
    }
    .hero {
      width: min(320px, 70vw);
      height: auto;
      border-radius: 20px;
      border: 5px solid var(--bark-light);
      box-shadow: 0 14px 28px rgba(0,0,0,0.4);
      animation: bob 3.2s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-12px); }
    }
    h1 {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.3em;
      flex-wrap: nowrap;
      white-space: nowrap;
      font-size: clamp(1.7rem, 6.5vw, 3.6rem);
      font-weight: 800;
      letter-spacing: 0.02em;
      margin-top: 1rem;
      line-height: 1.1;
    }
    h1 .title-text {
      color: var(--banana);
      text-shadow: 0 3px 0 var(--bark), 0 6px 18px rgba(0,0,0,0.4);
    }
    h1 .mono { font-size: 0.85em; flex-shrink: 0; }
    h1 .mono.flip { transform: rotateY(180deg); }
    .tagline {
      font-size: clamp(1rem, 3.5vw, 1.4rem);
      font-weight: 500;
      margin: 0.85rem auto 0;
      max-width: 30ch;
      line-height: 1.5;
      opacity: 0.95;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1.85rem;
      padding: 0.6rem 1.4rem;
      border-radius: 999px;
      background: var(--banana);
      color: var(--earth);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: 2px solid var(--bark);
      box-shadow: 0 6px 16px rgba(0,0,0,0.3);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.05); }
    }
    footer {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      padding: 0.6rem 1.25rem;
      font-size: 0.8rem;
      color: var(--cream);
      opacity: 0.9;
      z-index: 3;
    }
    footer a {
      color: var(--banana);
      text-decoration: underline;
      text-underline-offset: 2px;
      font-weight: 600;
    }
    footer a:hover { color: #fff; }
    @media (max-width: 640px) {
      footer { flex-direction: column; gap: 0.15rem; text-align: center; }
    }
  </style>
</head>
<body>
  <div class="bg-trees" aria-hidden="true">
    <span style="left: 2%;">🌴</span>
    <span style="right: 3%;">🌳</span>
  </div>

  <div class="header-shade" aria-hidden="true"></div>

  <div class="canopy" aria-hidden="true">
    <div class="foliage">
      <span>🌿</span><span>🍃</span><span>🌿</span><span>🍃</span><span>🌿</span>
      <span>🍃</span><span>🌿</span><span>🍃</span><span>🌿</span><span>🍃</span><span>🌿</span>
    </div>
    <span class="vine" style="left: 8%;  height: 150px; animation-delay: 0s;"></span>
    <span class="vine" style="left: 19%; height: 95px;  animation-delay: 1.2s;"></span>
    <span class="vine" style="left: 31%; height: 180px; animation-delay: 0.5s;"></span>
    <span class="vine" style="left: 44%; height: 110px; animation-delay: 2s;"></span>
    <span class="vine" style="left: 57%; height: 160px; animation-delay: 0.8s;"></span>
    <span class="vine" style="left: 69%; height: 90px;  animation-delay: 1.6s;"></span>
    <span class="vine" style="left: 81%; height: 200px; animation-delay: 0.3s;"></span>
    <span class="vine" style="left: 92%; height: 120px; animation-delay: 2.4s;"></span>
  </div>

  <div class="bananas" aria-hidden="true">
    <span style="left: 3%;  font-size: 3.2rem; animation-duration: 9s;   animation-delay: 0s;">🍌</span>
    <span style="left: 10%; font-size: 2.6rem; animation-duration: 12s;  animation-delay: 3s;">🍌</span>
    <span style="left: 17%; font-size: 4.2rem; animation-duration: 8s;   animation-delay: 1.5s;">🍌</span>
    <span style="left: 24%; font-size: 2.9rem; animation-duration: 11s;  animation-delay: 5s;">🍌</span>
    <span style="left: 31%; font-size: 3.6rem; animation-duration: 10s;  animation-delay: 2s;">🍌</span>
    <span style="left: 38%; font-size: 2.5rem; animation-duration: 13s;  animation-delay: 6s;">🍌</span>
    <span style="left: 45%; font-size: 4.5rem; animation-duration: 9.5s; animation-delay: 0.5s;">🍌</span>
    <span style="left: 52%; font-size: 3rem;   animation-duration: 12s;  animation-delay: 4s;">🍌</span>
    <span style="left: 59%; font-size: 3.8rem; animation-duration: 8.5s; animation-delay: 2.5s;">🍌</span>
    <span style="left: 66%; font-size: 2.7rem; animation-duration: 13s;  animation-delay: 1s;">🍌</span>
    <span style="left: 73%; font-size: 4rem;   animation-duration: 10.5s; animation-delay: 5.5s;">🍌</span>
    <span style="left: 80%; font-size: 3.3rem; animation-duration: 9s;   animation-delay: 7s;">🍌</span>
    <span style="left: 87%; font-size: 4.4rem; animation-duration: 11.5s; animation-delay: 3.5s;">🍌</span>
    <span style="left: 94%; font-size: 2.8rem; animation-duration: 12.5s; animation-delay: 1.8s;">🍌</span>
    <span style="left: 20%; font-size: 3.5rem; animation-duration: 14s;  animation-delay: 8s;">🍌</span>
    <span style="left: 70%; font-size: 3.1rem; animation-duration: 15s;  animation-delay: 6.5s;">🍌</span>
  </div>

  <main class="card">
    <img class="hero" src="punch-and-plushie.png" alt="Punch the monkey with his plush orangutan" />
    <h1>
      <span class="mono" aria-hidden="true">🐒</span>
      <span class="title-text">Punch Tamagotchi</span>
      <span class="mono flip" aria-hidden="true">🐒</span>
    </h1>
    <p class="tagline">Your pocket monkey who loves his plush orangutan. Feed him&nbsp;🍌, keep him happy, watch him grow.</p>
    <span class="badge">🍌 Coming Soon 🍌</span>
  </main>

  <div class="jungle-floor" aria-hidden="true">
    <div class="skyline">
      <span class="t2">🌴</span>
      <span class="t1">🌴</span>
      <span class="t3">🌴</span>
      <span class="t2">🌳</span>
      <span class="t1">🌴</span>
      <span class="t3">🌴</span>
      <span class="t2">🌴</span>
    </div>
  </div>

  <footer>
    <span>© 2026 Punch Tamagotchi · punch.gigacorp.co</span>
    <span>A <a href="https://www.gigacorp.co" target="_blank" rel="noopener noreferrer">GigaCorp</a> production</span>
  </footer>
</body>
</html>
